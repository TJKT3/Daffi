<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotspot Daffi</title>

<!-- CHAP LOGIN -->
$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
  <input type="hidden" name="username" />
  <input type="hidden" name="password" />
  <input type="hidden" name="dst" value="$(link-orig)" />
  <input type="hidden" name="popup" value="true" />
</form>
<script src="/md5.js"></script>
<script>
function doLogin() {
  document.sendin.username.value = document.login.username.value;
  document.sendin.password.value =
    hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
  document.sendin.submit();
  return false;
}
</script>
$(endif)

<style>
/* BODY */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
  overflow: hidden;
  position: relative;
}

/* PETIR ANIMASI */
.lightning {
  position: absolute;
  width: 2px;
  height: 100px;
  background: yellow;
  top: -100px;
  opacity: 0.7;
  animation: strike 2s infinite;
}

@keyframes strike {
  0% { top: -100px; opacity: 0; }
  20% { top: 0; opacity: 1; }
  40% { top: 200px; opacity: 0.5; }
  60% { top: 400px; opacity: 1; }
  80% { top: 600px; opacity: 0; }
  100% { top: -100px; opacity: 0; }
}

/* BOX LOGIN */
.container {
  width: 90%;
  max-width: 350px;
  background: rgba(255,255,255,0.15);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  text-align: center;
  z-index: 10;
  position: relative;
}

/* TITLE */
h2 {
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 0 0 10px #fffa00;
}

/* INPUT */
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

/* SUBMIT */
input[type="submit"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #fffa00;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

input[type="submit"]:hover {
  background: #ffd700;
}

/* ERROR */
.error {
  color: red;
  font-size: 13px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- PETIR ANIMASI -->
<div class="lightning" style="left:10%; animation-duration:2s;"></div>
<div class="lightning" style="left:30%; animation-duration:2.5s;"></div>
<div class="lightning" style="left:50%; animation-duration:3s;"></div>
<div class="lightning" style="left:70%; animation-duration:2.2s;"></div>
<div class="lightning" style="left:85%; animation-duration:2.8s;"></div>

<div class="container">
  <h2>Selamat Datang di Hotspot Daffi</h2>

  $(if error)
  <div class="error">$(error)</div>
  $(endif)

  <form name="login" action="$(link-login-only)" method="post"
        $(if chap-id) onsubmit="return doLogin()" $(endif)>

    <input type="hidden" name="dst" value="$(link-orig)">
    <input type="hidden" name="popup" value="true">

    <input name="username" type="text" placeholder="Username" value="$(username)">
    <input name="password" type="password" placeholder="Password">

    <input type="submit" value="Login">
  </form>
</div>

<script>
document.login.username.focus();
</script>
</body>
</html>
